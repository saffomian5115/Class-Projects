<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Four Wheels</title>
  <link rel="stylesheet" href="../../css/global.css"/>
  <link rel="stylesheet" href="../../css/components.css"/>
  <link rel="stylesheet" href="../../css/auth.css"/>
  <link rel="stylesheet" href="../../css/admin.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-scanlines"></div>
  <div class="bg-glow-orb orb1" style="background:radial-gradient(circle,rgba(191,0,255,0.15),transparent 70%)"></div>
  <div class="bg-glow-orb orb2"></div>
  <canvas id="particles-canvas"></canvas>

  <main class="admin-login-main">
    <div class="admin-login-card glass-card">

      <div class="admin-login-logo">
        <span style="font-size:2rem;color:var(--neon-purple);filter:drop-shadow(0 0 12px var(--neon-purple))">⬡</span>
        <div>
          <div class="logo-text" style="font-size:1.1rem;">FOUR<span class="logo-accent">WHEELS</span></div>
          <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--neon-purple);letter-spacing:0.2em;">ADMIN PANEL</div>
        </div>
      </div>

      <div class="auth-step-tag">// RESTRICTED ACCESS</div>
      <h1 class="auth-title" style="font-size:1.5rem;">ADMIN SIGN IN</h1>
      <p class="auth-subtitle" style="margin-bottom:24px;">Authorised personnel only</p>

      <!-- Security shield animation -->
      <div class="admin-shield">
        <div class="shield-ring sr1"></div>
        <div class="shield-ring sr2"></div>
        <div class="shield-icon">🛡️</div>
      </div>

      <form class="auth-form" id="adminLoginForm" novalidate>
        <div class="form-group">
          <label class="form-label">ADMIN EMAIL</label>
          <div class="input-icon-wrap">
            <span class="input-icon">@</span>
            <input type="email" id="adminEmail" placeholder="admin@fourwheels.pk" autocomplete="email"/>
          </div>
          <span class="form-error" id="adminEmailErr">Enter a valid email</span>
        </div>

        <div class="form-group">
          <label class="form-label">ADMIN PASSWORD</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="adminPass" placeholder="Admin password"/>
            <button type="button" class="toggle-pass" data-target="adminPass">👁</button>
          </div>
          <span class="form-error" id="adminPassErr">Password required</span>
        </div>

        <div class="admin-hint glass-card">
          <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);">
            Demo: <span style="color:var(--neon-cyan)">admin@fourwheels.pk</span> /
            <span style="color:var(--neon-cyan)">admin123</span>
          </span>
        </div>

        <button type="submit" class="btn-neon auth-submit" id="adminLoginBtn"
          style="background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));box-shadow:0 0 20px rgba(191,0,255,0.3);">
          <span id="adminBtnText">ACCESS PANEL</span>
          <span class="btn-loader hidden" id="adminLoader">⟳</span>
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;">
        <a href="../login.html" style="font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);">
          ← Back to User Login
        </a>
      </div>
    </div>
  </main>

  <script src="../../js/global.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    // Password toggle
    document.querySelector('.toggle-pass')?.addEventListener('click', function() {
      const inp = document.getElementById(this.dataset.target);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value.trim();
      const pass  = document.getElementById('adminPass').value;
      let valid = true;

      ['adminEmailErr','adminPassErr'].forEach(id => document.getElementById(id).classList.remove('visible'));
      ['adminEmail','adminPass'].forEach(id => document.getElementById(id).classList.remove('error'));

      if (!email.includes('@')) {
        document.getElementById('adminEmail').classList.add('error');
        document.getElementById('adminEmailErr').classList.add('visible');
        valid = false;
      }
      if (!pass) {
        document.getElementById('adminPass').classList.add('error');
        document.getElementById('adminPassErr').classList.add('visible');
        valid = false;
      }
      if (!valid) return;

      document.getElementById('adminLoginBtn').disabled = true;
      document.getElementById('adminBtnText').textContent = 'VERIFYING...';
      document.getElementById('adminLoader').classList.remove('hidden');

      await new Promise(r => setTimeout(r, 1500));

      if (email === 'admin@fourwheels.pk' && pass === 'admin123') {
        localStorage.setItem('fw_admin', JSON.stringify({ name: 'Super Admin', email }));
        localStorage.setItem('fw_admin_token', 'admin_token_' + Date.now());
        showToast('Access granted. Welcome, Admin!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        showToast('Invalid credentials. Access denied.', 'error');
        document.getElementById('adminLoginBtn').disabled = false;
        document.getElementById('adminBtnText').textContent = 'ACCESS PANEL';
        document.getElementById('adminLoader').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
